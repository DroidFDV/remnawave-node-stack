    server {
        listen 80;
        listen [::]:80;
        server_name ${DOMAIN};

        # Let's Encrypt HTTP-01 (acme.sh --webroot)
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/acme;
            default_type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
